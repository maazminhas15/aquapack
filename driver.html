<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aqua Pack — Driver</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0f1e;--card:#111827;--border:#1f2937;--blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--text:#f1f5f9;--muted:#64748b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:75px}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:11px 14px;position:sticky;top:0;z-index:99;display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.hdr-name{font-weight:700;font-size:0.95rem}
.hdr-sub{font-size:0.62rem;color:var(--muted)}
.hdr-btns{display:flex;gap:8px}
.hbtn{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.3);padding:7px 12px;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer}
.hbtn.gear{background:rgba(100,116,139,0.15);color:var(--muted);border-color:rgba(100,116,139,0.3)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:99}
.bnav-btn{flex:1;padding:9px 4px 7px;border:none;background:none;color:var(--muted);font-size:0.62rem;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.bnav-btn i{font-size:1.1rem}
.bnav-btn.on{color:var(--blue)}
.tab{display:none;padding:14px}
.tab.on{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.ttl{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:10px}
.inp{width:100%;background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:1rem;outline:none}
.inp:focus{border-color:var(--blue)}
.lbl{font-size:0.72rem;color:var(--muted);font-weight:600;display:block;margin-bottom:5px;text-transform:uppercase}
.fld{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{width:100%;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-blue{background:var(--blue);color:white}
.btn-green{background:var(--green);color:white}
.btn-sm{border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;padding:8px 12px;font-size:0.85rem;font-weight:600;cursor:pointer}
.btn-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:6px 10px;font-size:0.8rem;cursor:pointer}
/* Autocomplete */
.ac{position:relative;margin-bottom:12px}
.ac-inp{width:100%;background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:12px 14px 12px 42px;color:var(--text);font-size:1rem;outline:none}
.ac-inp:focus{border-color:var(--blue)}
.ac-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.drop{position:absolute;top:100%;left:0;right:0;background:#1e293b;border:1px solid var(--border);border-radius:10px;z-index:200;max-height:240px;overflow-y:auto;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,0.6);display:none}
.drop-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.drop-item:last-child{border-bottom:none}
.drop-item:active{background:rgba(59,130,246,0.1)}
.drop-name{font-weight:600;font-size:0.9rem}
.drop-addr{font-size:0.75rem;color:var(--muted);margin-top:2px}
.drop-bal{font-size:0.8rem;font-weight:700;color:var(--amber)}
/* Delivery row */
.del-row{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.del-name{font-weight:700;font-size:0.95rem;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.del-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.del-field label{font-size:0.68rem;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase}
.del-field input,.del-field select{width:100%;background:#0f172a;border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:0.95rem;outline:none}
.del-total{display:flex;justify-content:space-between;align-items:center;background:rgba(59,130,246,0.06);border-radius:8px;padding:8px 12px;font-size:0.85rem}
.prev-bal{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:8px;padding:10px 12px;margin-top:8px}
/* Summary bar */
.sumbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.sum-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.sum-val{font-weight:700;font-size:1rem}
.sum-lbl{font-size:0.62rem;color:var(--muted);margin-top:2px;text-transform:uppercase}
/* Client card */
.cli-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.cli-card.unpaid{border-left:3px solid var(--amber)}
.cli-card.paid{border-left:3px solid var(--green)}
/* Toast */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:10px;font-size:0.85rem;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);white-space:nowrap;animation:fadeUp 0.3s ease}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{text-align:center;padding:32px 16px;color:var(--muted)}
.empty i{font-size:2.2rem;margin-bottom:10px;display:block}
/* Quick expense buttons */
.exp-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.exp-btn{background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;font-size:0.75rem;font-weight:600;color:var(--sub)}
.exp-btn:active{border-color:var(--blue);color:var(--blue)}
/* History */
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.badge{padding:2px 8px;border-radius:20px;font-size:0.68rem;font-weight:700}
.b-cash{background:rgba(16,185,129,0.15);color:var(--green)}
.b-bal{background:rgba(245,158,11,0.15);color:var(--amber)}
.b-mon{background:rgba(59,130,246,0.15);color:var(--blue)}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-left">
    <div class="logo">💧</div>
    <div>
      <div class="hdr-name" id="hdrName">Driver View</div>
      <div class="hdr-sub" id="syncStatus">Not synced</div>
    </div>
  </div>
  <div class="hdr-btns">
    <button class="hbtn" onclick="doSync()"><i class="fa-solid fa-rotate"></i> Sync</button>
    <button class="hbtn gear" onclick="openSettings()"><i class="fa-solid fa-gear"></i></button>
  </div>
</div>

<!-- ENTRY TAB -->
<div class="tab on" id="tab-entry">
  <div class="card">
    <div class="ttl">📋 Today's Route</div>
    <div class="fld">
      <label class="lbl">Date</label>
      <input type="date" id="rDate" class="inp">
    </div>
    <div class="g2">
      <div class="fld">
        <label class="lbl">Your Name</label>
        <input type="text" id="rDriver" class="inp" placeholder="Driver name">
      </div>
      <div class="fld">
        <label class="lbl">Vehicle</label>
        <input type="text" id="rVehicle" class="inp" placeholder="LHR-1234">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ttl">➕ Add Client</div>
    <div class="ac">
      <i class="fa-solid fa-search ac-ico"></i>
      <input type="text" id="srchInp" class="ac-inp" placeholder="Search client name..." autocomplete="off" oninput="doSearch(this.value)">
      <div class="drop" id="srchDrop"></div>
    </div>
  </div>

  <!-- Delivery rows -->
  <div id="delRows"></div>

  <!-- Summary -->
  <div class="sumbar" id="sumbar" style="display:none">
    <div class="sum-box"><div class="sum-val" id="sTot">0</div><div class="sum-lbl">Bottles</div></div>
    <div class="sum-box"><div class="sum-val" id="sCash" style="color:var(--green)">0</div><div class="sum-lbl">Collected</div></div>
    <div class="sum-box"><div class="sum-val" id="sBal" style="color:var(--amber)">0</div><div class="sum-lbl">Balance</div></div>
  </div>

  <!-- Expenses -->
  <div class="card">
    <div class="ttl">💸 Route Expenses</div>
    <div class="g3">
      <div class="fld"><label class="lbl">Fuel</label><input type="number" id="rFuel" class="inp" value="0"></div>
      <div class="fld"><label class="lbl">Food</label><input type="number" id="rFood" class="inp" value="0"></div>
      <div class="fld"><label class="lbl">Other</label><input type="number" id="rOther" class="inp" value="0"></div>
    </div>
  </div>

  <button class="btn btn-green" onclick="saveRoute()"><i class="fa-solid fa-floppy-disk"></i> Save Route Sheet</button>
  <div style="height:8px"></div>
</div>

<!-- CLIENTS TAB -->
<div class="tab" id="tab-clients">
  <div class="ac" style="margin-bottom:14px">
    <i class="fa-solid fa-search ac-ico"></i>
    <input type="text" id="cliSearch" class="ac-inp" placeholder="Search client..." oninput="searchClients(this.value)">
  </div>
  <div id="cliResults"><div class="empty"><i class="fa-solid fa-users"></i><p>Type to search clients</p></div></div>
</div>

<!-- EXPENSES TAB -->
<div class="tab" id="tab-expenses">
  <div class="card">
    <div class="ttl">Log Expense</div>
    <div class="exp-btns">
      <div class="exp-btn" onclick="setExpCat('Fuel / Diesel')">⛽<br>Fuel</div>
      <div class="exp-btn" onclick="setExpCat('Food')">🍔<br>Food</div>
      <div class="exp-btn" onclick="setExpCat('Vehicle Maintenance')">🔧<br>Vehicle</div>
      <div class="exp-btn" onclick="setExpCat('Other')">📦<br>Other</div>
    </div>
    <div class="fld"><label class="lbl">Category</label><input type="text" id="expCat" class="inp" placeholder="Select above or type"></div>
    <div class="fld"><label class="lbl">Details</label><input type="text" id="expDet" class="inp" placeholder="e.g. Fill tank at PSO"></div>
    <div class="g2">
      <div class="fld"><label class="lbl">Amount (PKR)</label><input type="number" id="expAmt" class="inp" placeholder="0"></div>
      <div class="fld"><label class="lbl">Date</label><input type="date" id="expDate" class="inp"></div>
    </div>
    <button class="btn btn-blue" onclick="saveExpense()"><i class="fa-solid fa-plus"></i> Log Expense</button>
  </div>
  <div id="expList"></div>
</div>

<!-- HISTORY TAB -->
<div class="tab" id="tab-history">
  <div id="histList"></div>
</div>

<!-- Bottom Nav -->
<div class="bnav">
  <button class="bnav-btn on" id="nb-entry" onclick="switchTab('entry')"><i class="fa-solid fa-plus-circle"></i>Entry</button>
  <button class="bnav-btn" id="nb-clients" onclick="switchTab('clients')"><i class="fa-solid fa-users"></i>Clients</button>
  <button class="bnav-btn" id="nb-expenses" onclick="switchTab('expenses')"><i class="fa-solid fa-receipt"></i>Expenses</button>
  <button class="bnav-btn" id="nb-history" onclick="switchTab('history')"><i class="fa-solid fa-clock-rotate-left"></i>History</button>
</div>


<script>
// ============ STATE ============
let state = { clients:[], routes:[], expenses:[], invoices:[], config:{webAppUrl:''} };
let deliveries = [];
let _qType = 'Cash';

function loadState() {
  try { state.clients  = JSON.parse(localStorage.getItem('aqua_clients')  || '[]'); } catch(e){ state.clients=[]; }
  try { state.routes   = JSON.parse(localStorage.getItem('aqua_routes')   || '[]'); } catch(e){ state.routes=[]; }
  try { state.expenses = JSON.parse(localStorage.getItem('aqua_expenses') || '[]'); } catch(e){ state.expenses=[]; }
  try { state.invoices = JSON.parse(localStorage.getItem('aqua_invoices') || '[]'); } catch(e){ state.invoices=[]; }
  try { state.config   = JSON.parse(localStorage.getItem('aqua_config')   || '{}'); } catch(e){ state.config={}; }
}

function saveState() {
  localStorage.setItem('aqua_clients',  JSON.stringify(state.clients));
  localStorage.setItem('aqua_routes',   JSON.stringify(state.routes));
  localStorage.setItem('aqua_expenses', JSON.stringify(state.expenses));
  localStorage.setItem('aqua_invoices', JSON.stringify(state.invoices));
  localStorage.setItem('aqua_config',   JSON.stringify(state.config));
}

// ============ HELPERS ============
function today() {
  // Always return YYYY-MM-DD — never let JS timezone shift it
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dy= String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dy}`;
}

function fmt(n) { return 'PKR ' + Number(n||0).toLocaleString(); }

function fmtDate(s) {
  if(!s) return '-';
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const p = s.split('-');
  if(p.length!==3) return s;
  return parseInt(p[2])+' '+mo[parseInt(p[1])-1]+' '+p[0];
}

function recalcBal(clientId) {
  let r=0;
  state.routes.forEach(rt=>(rt.deliveries||[]).forEach(d=>{ if(d.clientId===clientId) r+=Number(d.balance||0); }));
  let p=0;
  state.invoices.forEach(inv=>{ if(inv.clientId===clientId) p+=Number(inv.amountPaid||0); });
  return Math.max(0,r-p);
}

function toast(msg, type='ok') {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// ============ TABS ============
function switchTab(t) {
  ['entry','clients','expenses','history'].forEach(id=>{
    document.getElementById('tab-'+id)?.classList.remove('on');
    document.getElementById('nb-'+id)?.classList.remove('on');
  });
  document.getElementById('tab-'+t)?.classList.add('on');
  document.getElementById('nb-'+t)?.classList.add('on');
  if(t==='history') renderHistory();
  if(t==='expenses') renderExpenses();
}

// ============ SYNC ============
function openSettings() {
  const cur = state.config.webAppUrl || '';
  const url = prompt('Enter Google Apps Script URL:\n\nGet this from Sheet Sync tab in main ERP', cur);
  if(url===null) return;
  if(url.trim()) {
    state.config.webAppUrl = url.trim();
    saveState();
    toast('URL saved! Syncing...');
    doSync();
  } else {
    state.config.webAppUrl='';
    saveState();
    toast('URL cleared','err');
  }
}

function doSync() {
  if(!state.config.webAppUrl) {
    toast('Tap ⚙️ to set URL first','err');
    setTimeout(openSettings,1200);
    return;
  }
  const st = document.getElementById('syncStatus');
  if(st) st.textContent='Syncing...';
  fetch(state.config.webAppUrl, {cache:'no-store'})
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(data=>{
      if(data.status==='error') throw new Error(data.message||'Server error');
      let got=[];
      if(data.clients  && data.clients.length>0)  { state.clients=data.clients;   localStorage.setItem('aqua_clients', JSON.stringify(data.clients));   got.push(data.clients.length+' clients'); }
      if(data.routes   && data.routes.length>0)   { state.routes=data.routes;     localStorage.setItem('aqua_routes',  JSON.stringify(data.routes));    got.push(data.routes.length+' routes'); }
      if(data.invoices && data.invoices.length>0)  { state.invoices=data.invoices; localStorage.setItem('aqua_invoices',JSON.stringify(data.invoices));  got.push(data.invoices.length+' invoices'); }
      if(data.expenses && data.expenses.length>0)  { state.expenses=data.expenses; localStorage.setItem('aqua_expenses',JSON.stringify(data.expenses));  got.push(data.expenses.length+' expenses'); }
      const now=new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
      if(st) st.textContent='✓ Synced '+now;
      toast('Synced! '+(got.join(', ')||'Up to date'));
      // refresh client search
      const cs=document.getElementById('cliSearch');
      if(cs&&cs.value) searchClients(cs.value);
    })
    .catch(err=>{ if(st) st.textContent='✗ Failed'; toast('Sync failed: '+err.message,'err'); });
}

function pushData() {
  if(!state.config.webAppUrl) return;
  fetch(state.config.webAppUrl,{
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({
      action:'syncAll',
      clients:  state.clients,
      routes:   state.routes,
      expenses: state.expenses,
      invoices: state.invoices,
      staff:[],salaryPayments:[]
    })
  }).catch(e=>console.error('Push error:',e));
}

// ============ ENTRY TAB ============
function doSearch(q) {
  const drop = document.getElementById('srchDrop');
  if(!q.trim()) { drop.style.display='none'; return; }
  const res = state.clients.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!res.length) { drop.style.display='none'; return; }
  drop.innerHTML = res.map(c=>{
    const bal = recalcBal(c.id);
    return `<div class="drop-item" onclick="addClient('${c.id}')">
      <div>
        <div class="drop-name">${c.name}</div>
        <div class="drop-addr">${c.address||'No address'}</div>
      </div>
      <div style="text-align:right">
        ${bal>0?`<div class="drop-bal">${fmt(bal)}</div>`:''}
        <div style="font-size:0.7rem;color:var(--muted)">${c.type}</div>
      </div>
    </div>`;
  }).join('');
  drop.style.display='block';
}

function addClient(id) {
  if(deliveries.find(d=>d.clientId===id)) { toast('Already added!','err'); return; }
  const c = state.clients.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('srchInp').value='';
  document.getElementById('srchDrop').style.display='none';

  const bal  = recalcBal(id);
  const type = c.type==='Monthly'?'Monthly':'Cash';
  const price= Number(c.rate)||200;

  // Show quick popup
  showQuickPopup(c, bal, type, price);
}

function showQuickPopup(c, bal, defType, price) {
  document.getElementById('qpop')?.remove();
  document.getElementById('qback')?.remove();

  const back = document.createElement('div');
  back.id='qback';
  back.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999';
  back.onclick=()=>{ back.remove(); document.getElementById('qpop')?.remove(); };

  const pop = document.createElement('div');
  pop.id='qpop';
  pop.style.cssText='position:fixed;bottom:80px;left:10px;right:10px;background:#1e293b;border:1px solid #334155;border-radius:16px;padding:18px;z-index:1000;box-shadow:0 8px 40px rgba(0,0,0,0.8)';
  pop.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div style="font-weight:700;font-size:1rem">${c.name}</div>
        <div style="font-size:0.75rem;color:var(--muted)">${c.address||''}</div>
      </div>
      <button onclick="document.getElementById('qpop').remove();document.getElementById('qback').remove()" style="background:#334155;border:none;color:#94a3b8;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem">✕</button>
    </div>
    ${bal>0?`<div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:0.85rem;color:var(--amber)">⚠️ Previous balance: ${fmt(bal)}</div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div><label style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px">QTY (Bottles)</label>
        <input id="qQty" type="number" inputmode="numeric" value="1" oninput="qCalc()" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 10px;color:var(--text);font-size:1.1rem;font-weight:700;outline:none"></div>
      <div><label style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px">Price (PKR)</label>
        <input id="qPrice" type="number" inputmode="numeric" value="${price}" oninput="qCalc()" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 10px;color:var(--text);font-size:1rem;outline:none"></div>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px">Payment Type</label>
      <div style="display:flex;gap:8px">
        <button id="qt-Cash" onclick="qType('Cash')" style="flex:1;padding:9px;border-radius:8px;border:2px solid ${defType==='Cash'?'#10b981':'#334155'};background:${defType==='Cash'?'rgba(16,185,129,0.15)':'#0f172a'};color:var(--text);cursor:pointer;font-weight:700;font-size:0.85rem">Cash</button>
        <button id="qt-Bal" onclick="qType('Bal')" style="flex:1;padding:9px;border-radius:8px;border:2px solid ${defType==='Bal'?'#f59e0b':'#334155'};background:${defType==='Bal'?'rgba(245,158,11,0.15)':'#0f172a'};color:var(--text);cursor:pointer;font-weight:700;font-size:0.85rem">Bal</button>
        <button id="qt-Monthly" onclick="qType('Monthly')" style="flex:1;padding:9px;border-radius:8px;border:2px solid ${defType==='Monthly'?'#3b82f6':'#334155'};background:${defType==='Monthly'?'rgba(59,130,246,0.15)':'#0f172a'};color:var(--text);cursor:pointer;font-weight:700;font-size:0.85rem">Monthly</button>
      </div>
    </div>
    <div id="qTotalLine" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:9px 12px;margin-bottom:12px;display:flex;justify-content:space-between;font-size:0.88rem">
      <span style="color:var(--muted)">Total to collect:</span>
      <span id="qTotalVal" style="color:var(--green);font-weight:700">${fmt(price)}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button onclick="document.getElementById('qpop').remove();document.getElementById('qback').remove()" style="padding:12px;border-radius:10px;border:1px solid #334155;background:transparent;color:var(--muted);cursor:pointer;font-weight:600">Cancel</button>
      <button onclick="confirmAdd('${c.id}','${c.name.replace(/'/g,"\\'")}','${(c.address||'').replace(/'/g,"\\'")}',${bal})" style="padding:12px;border-radius:10px;border:none;background:var(--blue);color:white;cursor:pointer;font-weight:700;font-size:1rem">✓ Add</button>
    </div>`;

  _qType = defType;
  document.body.appendChild(back);
  document.body.appendChild(pop);
  setTimeout(()=>{ const q=document.getElementById('qQty'); if(q){q.focus();q.select();} },80);
}

function qType(t) {
  _qType=t;
  const cols={Cash:'#10b981',Bal:'#f59e0b',Monthly:'#3b82f6'};
  const bgs={Cash:'rgba(16,185,129,0.15)',Bal:'rgba(245,158,11,0.15)',Monthly:'rgba(59,130,246,0.15)'};
  ['Cash','Bal','Monthly'].forEach(x=>{
    const b=document.getElementById('qt-'+x);
    if(!b) return;
    b.style.borderColor = x===t?cols[x]:'#334155';
    b.style.background  = x===t?bgs[x]:'#0f172a';
  });
  qCalc();
}

function qCalc() {
  const qty  = parseInt(document.getElementById('qQty')?.value)||0;
  const price= parseFloat(document.getElementById('qPrice')?.value)||0;
  const total= qty*price;
  const el   = document.getElementById('qTotalVal');
  if(el) el.textContent = fmt(_qType==='Cash'?total:0);
}

function confirmAdd(clientId, clientName, addr, prevBal) {
  const qty   = Math.max(0, parseInt(document.getElementById('qQty')?.value)||0);
  const price = Math.max(0, parseFloat(document.getElementById('qPrice')?.value)||0);
  const type  = _qType||'Cash';
  const total = qty*price;
  const rec   = type==='Cash'?total:0;
  const bal   = Math.max(0,total-rec);
  if(qty<=0) { toast('Enter qty!','err'); return; }
  deliveries.push({ clientId, clientName, address:addr, qty, price, total, remarks:type, received:rec, balance:bal, prevPay:0 });
  document.getElementById('qpop')?.remove();
  document.getElementById('qback')?.remove();
  renderRows();
  calcSummary();
  toast(`${clientName} added — ${qty} bottles`);
}

function renderRows() {
  const el=document.getElementById('delRows');
  if(!el) return;
  if(!deliveries.length){el.innerHTML='';document.getElementById('sumbar').style.display='none';return;}
  document.getElementById('sumbar').style.display='grid';
  el.innerHTML = deliveries.map((d,i)=>{
    const total=d.qty*d.price;
    const rec=d.remarks==='Cash'?total:(d.received||0);
    const bal=Math.max(0,total-rec);
    return `<div class="del-row">
      <div class="del-name">
        <span>${d.clientName}</span>
        <button class="btn-red" onclick="removeDel(${i})"><i class="fa-solid fa-trash"></i></button>
      </div>
      <div class="del-fields">
        <div class="del-field"><label>Qty</label><input type="number" inputmode="numeric" value="${d.qty}" onchange="updDel(${i},'qty',this.value)" style="font-size:1.1rem;font-weight:700"></div>
        <div class="del-field"><label>Price</label><input type="number" inputmode="numeric" value="${d.price}" onchange="updDel(${i},'price',this.value)"></div>
        <div class="del-field"><label>Type</label><select onchange="updDel(${i},'type',this.value)">
          <option ${d.remarks==='Cash'?'selected':''}>Cash</option>
          <option value="Bal" ${d.remarks==='Bal'?'selected':''}>Bal</option>
          <option value="Monthly" ${d.remarks==='Monthly'?'selected':''}>Monthly</option>
        </select></div>
        <div class="del-field"><label>Received</label><input type="number" inputmode="numeric" value="${rec}" ${d.remarks==='Cash'?'readonly style="opacity:0.5"':''} onchange="updDel(${i},'rec',this.value)"></div>
      </div>
      <div class="del-total">
        <span style="color:var(--muted)">Total: <b style="color:var(--text)">${fmt(total)}</b></span>
        <span style="color:${bal>0?'var(--amber)':'var(--green)'}">Bal: <b>${fmt(bal)}</b></span>
      </div>
    </div>`;
  }).join('');
}

function updDel(i,f,v) {
  const d=deliveries[i];
  if(f==='qty')  { d.qty=Math.max(0,parseInt(v)||0); d.total=d.qty*d.price; if(d.remarks==='Cash') d.received=d.total; }
  if(f==='price'){ d.price=Math.max(0,parseFloat(v)||0); d.total=d.qty*d.price; if(d.remarks==='Cash') d.received=d.total; }
  if(f==='type') { d.remarks=v; if(v==='Cash'){d.received=d.total;}else{d.received=0;} }
  if(f==='rec')  { d.received=Math.max(0,parseFloat(v)||0); }
  d.balance=Math.max(0,d.total-d.received);
  renderRows(); calcSummary();
}

function removeDel(i) { deliveries.splice(i,1); renderRows(); calcSummary(); }

function calcSummary() {
  let btl=0,cash=0,bal=0;
  deliveries.forEach(d=>{ btl+=d.qty; cash+=d.received; bal+=Math.max(0,d.total-d.received); });
  document.getElementById('sTot').textContent=btl;
  document.getElementById('sCash').textContent=fmt(cash);
  document.getElementById('sBal').textContent=fmt(bal);
}

function saveRoute() {
  const date   = document.getElementById('rDate').value;
  const driver = document.getElementById('rDriver').value.trim();
  const vehicle= document.getElementById('rVehicle').value.trim();
  if(!date||!driver||!vehicle){ toast('Fill date, name & vehicle!','err'); return; }
  if(!deliveries.length){ toast('Add at least one client!','err'); return; }

  // Ensure date is always YYYY-MM-DD string
  const safeDate = String(date).slice(0,10);

  let totQty=0,totVal=0,totCash=0,totBal=0;
  const saves = deliveries.map(d=>{
    const total=d.qty*d.price;
    const rec=d.remarks==='Cash'?total:(d.received||0);
    const bal=Math.max(0,total-rec);
    totQty+=d.qty; totVal+=total; totCash+=rec; totBal+=bal;
    return {...d,total,received:rec,balance:bal};
  });

  const route={
    id:'r_'+Date.now(),
    date:safeDate,  // always YYYY-MM-DD
    driver, vehicle,
    fuel:  parseFloat(document.getElementById('rFuel').value)||0,
    food:  parseFloat(document.getElementById('rFood').value)||0,
    other: parseFloat(document.getElementById('rOther').value)||0,
    startKm:0, endKm:0,
    totalQty:totQty, totalVal:totVal, collectedCash:totCash, outstandingAdded:totBal,
    deliveries:saves
  };

  // Update client balances
  saves.forEach(d=>{
    const c=state.clients.find(x=>x.id===d.clientId);
    if(c) c.balance=Number(c.balance||0)+Number(d.balance);
  });

  state.routes.push(route);
  localStorage.setItem('aq_driver', driver);
  saveState();
  pushData();

  deliveries=[];
  renderRows();
  document.getElementById('rFuel').value='0';
  document.getElementById('rFood').value='0';
  document.getElementById('rOther').value='0';
  document.getElementById('sumbar').style.display='none';
  toast(`✓ Route saved! ${totQty} bottles · ${fmt(totCash)} collected`);
}

// ============ CLIENTS TAB ============
function searchClients(q) {
  const el=document.getElementById('cliResults');
  if(!q.trim()){ el.innerHTML='<div class="empty"><i class="fa-solid fa-users"></i><p>Type to search clients</p></div>'; return; }
  const res=state.clients.filter(c=>c.name.toLowerCase().includes(q.toLowerCase()));
  if(!res.length){ el.innerHTML='<div class="empty"><i class="fa-solid fa-search"></i><p>No clients found</p></div>'; return; }
  el.innerHTML=res.map(c=>{
    const bal=recalcBal(c.id);
    let lastDel='-'; let totBtl=0;
    state.routes.forEach(r=>(r.deliveries||[]).forEach(d=>{
      if(d.clientId===c.id){ totBtl+=Number(d.qty||0); if(!lastDel||r.date>lastDel) lastDel=r.date; }
    }));
    return `<div class="cli-card ${bal>0?'unpaid':'paid'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-weight:700;font-size:1rem">${c.name}</div>
          <div style="font-size:0.78rem;color:var(--muted)">${c.address||'No address'} · ${c.type}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700;font-size:1rem;color:${bal>0?'var(--amber)':'var(--green)'}">${fmt(bal)}</div>
          <div style="font-size:0.7rem;color:var(--muted)">${bal>0?'UNPAID':'CLEAR'}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="background:#0f172a;border-radius:8px;padding:8px;text-align:center">
          <div style="font-weight:700">${totBtl}</div><div style="font-size:0.65rem;color:var(--muted)">TOTAL BOTTLES</div>
        </div>
        <div style="background:#0f172a;border-radius:8px;padding:8px;text-align:center">
          <div style="font-weight:700">${fmtDate(lastDel)}</div><div style="font-size:0.65rem;color:var(--muted)">LAST DELIVERY</div>
        </div>
      </div>
      ${bal>0?`<button onclick="recordPay('${c.id}','${c.name.replace(/'/g,"\\'")}',${bal})" style="width:100%;background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:9px;font-weight:700;cursor:pointer;font-size:0.88rem">💳 Record Payment</button>`:''}
      ${c.phone?`<div style="margin-top:8px"><a href="tel:${c.phone}" style="color:var(--blue);font-size:0.82rem;text-decoration:none"><i class="fa-solid fa-phone mr-1"></i>${c.phone}</a></div>`:''}
    </div>`;
  }).join('');
}

function recordPay(clientId, clientName, bal) {
  const amt=prompt(`Record payment for ${clientName}\nBalance: ${fmt(bal)}\n\nAmount received:`, bal);
  if(!amt||isNaN(amt)||Number(amt)<=0) return;
  const paid=Math.min(Number(amt),bal);
  const dt=today();
  state.invoices.push({
    id:'inv_'+Date.now(), invoiceNo:'PAY-'+Date.now(),
    clientId, clientName, clientAddress:'', clientPhone:'',
    issueDate:dt, startDate:dt, endDate:dt,
    createdAt:new Date().toISOString(),
    grandTotal:paid, periodSales:0, previousBalance:bal,
    qty:0, status:'PAID', amountPaid:paid,
    payments:[{amount:paid, date:dt, note:'Collected on route'}], items:[]
  });
  const c=state.clients.find(x=>x.id===clientId);
  if(c) c.balance=Math.max(0,Number(c.balance||0)-paid);
  saveState(); pushData();
  toast(`✓ PKR ${Number(paid).toLocaleString()} recorded for ${clientName}`);
  document.getElementById('cliSearch').dispatchEvent(new Event('input'));
}

// ============ EXPENSES TAB ============
function setExpCat(cat) {
  document.getElementById('expCat').value=cat;
  document.getElementById('expAmt').focus();
}

function saveExpense() {
  const cat=document.getElementById('expCat').value.trim();
  const det=document.getElementById('expDet').value.trim();
  const amt=parseFloat(document.getElementById('expAmt').value)||0;
  const dt =document.getElementById('expDate').value || today();
  const safeDate = String(dt).slice(0,10); // ensure YYYY-MM-DD
  if(!cat||amt<=0){ toast('Category & amount required','err'); return; }
  state.expenses.push({id:'exp_'+Date.now(), date:safeDate, category:cat, details:det||cat, amount:amt});
  saveState(); pushData();
  document.getElementById('expCat').value='';
  document.getElementById('expDet').value='';
  document.getElementById('expAmt').value='';
  toast(`✓ ${cat} — ${fmt(amt)} logged`);
  renderExpenses();
}

function renderExpenses() {
  const el=document.getElementById('expList');
  if(!el) return;
  const recent=[...state.expenses].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  if(!recent.length){ el.innerHTML='<div class="empty"><i class="fa-solid fa-receipt"></i><p>No expenses yet</p></div>'; return; }
  el.innerHTML=recent.map(e=>`
    <div class="hist-card" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:700;font-size:0.9rem">${e.category}</div>
        <div style="font-size:0.78rem;color:var(--muted)">${e.details} · ${fmtDate(e.date)}</div>
      </div>
      <div style="color:var(--red);font-weight:700;font-size:1rem">${fmt(e.amount)}</div>
    </div>`).join('');
}

// ============ HISTORY TAB ============
function renderHistory() {
  const el=document.getElementById('histList');
  if(!el) return;
  const routes=[...state.routes].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  if(!routes.length){ el.innerHTML='<div class="empty"><i class="fa-solid fa-clock-rotate-left"></i><p>No routes saved yet</p></div>'; return; }
  el.innerHTML=routes.map(r=>{
    const exp=Number(r.fuel||0)+Number(r.food||0)+Number(r.other||0);
    const net=Number(r.collectedCash||0)-exp;
    const dels=(r.deliveries||[]);
    return `<div class="hist-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-weight:700;font-size:0.95rem">${fmtDate(r.date)}</div>
          <div style="font-size:0.75rem;color:var(--muted)">${r.driver} · ${r.vehicle} · ${dels.length} clients</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700;color:var(--green)">${fmt(r.collectedCash)}</div>
          <div style="font-size:0.72rem;color:${net>=0?'var(--green)':'var(--red)'}">Net: ${fmt(net)}</div>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${dels.slice(0,6).map(d=>`<span class="badge ${d.remarks==='Cash'?'b-cash':d.remarks==='Monthly'?'b-mon':'b-bal'}">${d.clientName} ${d.qty}btl</span>`).join('')}
        ${dels.length>6?`<span class="badge" style="background:#1e293b;color:var(--muted)">+${dels.length-6} more</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ============ INIT ============
window.addEventListener('DOMContentLoaded',()=>{
  loadState();

  // Set dates
  document.getElementById('rDate').value  = today();
  document.getElementById('expDate').value= today();

  // Restore driver name
  const savedName=localStorage.getItem('aq_driver')||'';
  if(savedName) {
    document.getElementById('rDriver').value=savedName;
    document.getElementById('hdrName').textContent=savedName;
  } else {
    setTimeout(()=>{
      const n=prompt('Welcome to Aqua Pack Driver!\n\nEnter your name:');
      if(n&&n.trim()){
        localStorage.setItem('aq_driver',n.trim());
        document.getElementById('rDriver').value=n.trim();
        document.getElementById('hdrName').textContent=n.trim();
        toast('Welcome, '+n.trim()+'!');
      }
    },600);
  }

  // Close autocomplete on outside tap
  document.addEventListener('click',e=>{
    if(!e.target.closest('.ac')) document.getElementById('srchDrop').style.display='none';
  });

  // Auto-sync on load
  if(state.config.webAppUrl) {
    const st=document.getElementById('syncStatus');
    if(st) st.textContent='Loading...';
    fetch(state.config.webAppUrl,{cache:'no-store'})
      .then(r=>r.json())
      .then(data=>{
        if(data.clients&&data.clients.length>0)  { state.clients=data.clients;   localStorage.setItem('aqua_clients',JSON.stringify(data.clients)); }
        if(data.routes&&data.routes.length>0)     { state.routes=data.routes;     localStorage.setItem('aqua_routes',JSON.stringify(data.routes)); }
        if(data.invoices&&data.invoices.length>0) { state.invoices=data.invoices; localStorage.setItem('aqua_invoices',JSON.stringify(data.invoices)); }
        if(data.expenses&&data.expenses.length>0) { state.expenses=data.expenses; localStorage.setItem('aqua_expenses',JSON.stringify(data.expenses)); }
        const now=new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
        if(st) st.textContent='✓ Synced '+now;
      }).catch(()=>{ if(st) st.textContent='Offline'; });
  }
});
</script>
</body>
</html>
